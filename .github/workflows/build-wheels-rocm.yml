name: Build ROCm Wheels

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Git ref to build (tag recommended for releases, e.g. v0.1.0)'
        required: true
        type: string
      config:
        description: 'Override configurations to build: key1:item1-1,item1-2;key2:item2-1,item2-2'
        default: 'Default'
        required: false
        type: string
      exclude:
        description: 'Exclude build configurations: key1-1:item1-1,key1-2:item1-2;key2-1:item2-1,key2-2:item2-2'
        default: 'Default'
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Git ref to build'
        required: true
        type: string
      config:
        description: 'Configurations to build: key1:item1-1,item1-2;key2:item2-1,item2-2'
        default: 'Default'
        required: false
        type: string
      exclude:
        description: 'Exclude build configurations: key1-1:item1-1,key1-2:item1-2;key2-1:item2-1,key2-2:item2-2'
        default: 'Default'
        required: false
        type: string

permissions:
  contents: write

jobs:
  define_matrix:
    name: Define Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    defaults:
      run:
        shell: pwsh
    env:
      CONFIGIN: ${{ inputs.config }}
      EXCLUDEIN: ${{ inputs.exclude }}

    steps:
      - name: Define Job Output
        id: set-matrix
        run: |
          $matrix = @{
              'os' = @('ubuntu-22.04', 'windows-2022')
              'pyver' = @("3.11")
          }

          if ($env:CONFIGIN -ne 'Default') {$env:CONFIGIN.split(';').foreach({$matrix[$_.split(':')[0]] = $_.split(':')[1].split(',')})}

          if ($env:EXCLUDEIN -notin ('None','Default')) {
              $exclusions = @()
              $exclusions += $env:EXCLUDEIN.split(';').replace(':','=').replace(',',"`n") | ConvertFrom-StringData
              $matrix['exclude'] = $exclusions
          }

          $matrixOut = ConvertTo-Json $matrix -Compress
          Write-Output ('matrix=' + $matrixOut) >> $env:GITHUB_OUTPUT

  build_wheels:
    name: ${{ matrix.os }} ROCm
    needs: define_matrix
    runs-on: ${{ matrix.os }}
    strategy:
      matrix: ${{ fromJSON(needs.define_matrix.outputs.matrix) }}
    defaults:
      run:
        shell: pwsh
    env:
      ROCM_VERSION: '7.2'
      HIPSDK_INSTALLER_VERSION: '26.Q1'

    steps:
      - name: Free Disk Space
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - uses: actions/checkout@v6
        with:
          repository: 'vladlearns/llama-cpp-bin'
          ref: ${{ inputs.version }}
          submodules: 'recursive'

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.20
        with:
          key: rocm-${{ matrix.os }}
          variant: ccache
          evict-old-files: 14d

      - name: Install Linux ROCm SDK
        if: runner.os == 'Linux'
        shell: bash
        run: |
          [ ! -d /etc/apt/keyrings ] && sudo mkdir --parents --mode=0755 /etc/apt/keyrings
          wget https://repo.radeon.com/rocm/rocm.gpg.key -O - | gpg --dearmor | sudo tee /etc/apt/keyrings/rocm.gpg > /dev/null
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/rocm/apt/$ROCM_VERSION jammy main" | sudo tee --append /etc/apt/sources.list.d/rocm.list
          echo -e 'Package: *\nPin: release o=repo.radeon.com\nPin-Priority: 600' | sudo tee /etc/apt/preferences.d/rocm-pin-600
          sudo apt update
          sudo apt install -y libssl-dev rocm-hip-sdk

      - name: Install Windows ROCm SDK
        if: runner.os == 'Windows'
        run: |
          Invoke-WebRequest -Uri "https://download.amd.com/developer/eula/rocm-hub/AMD-Software-PRO-Edition-${env:HIPSDK_INSTALLER_VERSION}-Win11-For-HIP.exe" -OutFile "${env:RUNNER_TEMP}\rocm-install.exe"
          Start-Process "${env:RUNNER_TEMP}\rocm-install.exe" -ArgumentList '-install' -NoNewWindow -Wait
          $hipPath = (Resolve-Path 'C:\Program Files\AMD\ROCm\*\bin\clang.exe' | Split-Path | Split-Path)
          echo "$hipPath\bin" >> $env:GITHUB_PATH
          echo "ROCM_PATH=$hipPath" >> $env:GITHUB_ENV
          echo "HIP_PATH=$hipPath" >> $env:GITHUB_ENV

      - name: Download rocWMMA headers
        if: runner.os == 'Windows'
        run: |
          curl -o rocwmma.deb "https://repo.radeon.com/rocm/apt/$env:ROCM_VERSION/pool/main/r/rocwmma-dev/rocwmma-dev_2.2.0.70200-43~24.04_amd64.deb"
          7z x rocwmma.deb
          7z x data.tar

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.pyver }}

      - name: Install Dependencies
        run: |
          python -m pip install build cmake

      - name: Build Wheel
        run: |
          if ($IsLinux) {
            $env:CMAKE_PREFIX_PATH = '/opt/rocm'
            $env:PATH = "/opt/rocm/bin:$env:PATH"
            $env:ROCM_PATH = "/opt/rocm"
            $env:HIP_PATH = "/opt/rocm"
            $env:HIP_PLATFORM = "amd"
            $gputargets = 'gfx908;gfx90a;gfx942;gfx1030;gfx1100;gfx1101;gfx1151;gfx1150;gfx1200;gfx1201'
          } else {
            $env:CC = "$env:HIP_PATH\bin\clang.exe"
            $env:CXX = "$env:HIP_PATH\bin\clang++.exe"
            $env:CMAKE_PREFIX_PATH = $env:HIP_PATH
            $gputargets = 'gfx1030;gfx1031;gfx1032;gfx1100;gfx1101;gfx1102;gfx1150;gfx1151;gfx1200;gfx1201'
          }
          $env:VERBOSE = '1'

          $generator = 'Unix Makefiles'
          $env:CMAKE_ARGS = "-G '$generator' -DGGML_HIP=ON -DGGML_HIP_ROCWMMA_FATTN=ON -DGPU_TARGETS=$gputargets"
          if ($IsLinux) {
            $env:CMAKE_ARGS += " -DCMAKE_HIP_COMPILER=/opt/rocm/llvm/bin/clang -DCMAKE_HIP_FLAGS='-mllvm --amdgpu-unroll-threshold-local=600'"
          } else {
            $rocwmmaInclude = "$($PWD.Path.Replace('\', '/'))/opt/rocm-$env:ROCM_VERSION.0/include/"
            $env:CMAKE_ARGS += " -DCMAKE_CXX_FLAGS='-I$rocwmmaInclude -Wno-ignored-attributes -Wno-nested-anon-types'"
          }
          $buildtag = "+rocm$env:ROCM_VERSION"

          $env:CMAKE_ARGS = "-DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=off -DGGML_BACKEND_DL=on -DGGML_CPU_ALL_VARIANTS=on -DGGML_RPC=on -DLLAMA_BUILD_TESTS=off -DLLAMA_BUILD_EXAMPLES=off $env:CMAKE_ARGS"

          if (-not $IsLinux) {
            $env:CMAKE_ARGS += " -DLLAMA_BUILD_BORINGSSL=ON"
          }

          if (-not $IsLinux) {
            $binDir = "src/llama_cpp_bin/bin"
            New-Item -ItemType Directory -Path $binDir -Force | Out-Null
            Copy-Item "$env:HIP_PATH\bin\libhipblas.dll" $binDir
            Copy-Item "$env:HIP_PATH\bin\libhipblaslt.dll" $binDir
            Copy-Item "$env:HIP_PATH\bin\rocblas.dll" $binDir
            New-Item -ItemType Directory -Path "$binDir\rocblas\library" -Force | Out-Null
            Copy-Item "$env:HIP_PATH\bin\rocblas\library\*" "$binDir\rocblas\library\"
            New-Item -ItemType Directory -Path "$binDir\hipblaslt\library" -Force | Out-Null
            Copy-Item "$env:HIP_PATH\bin\hipblaslt\library\*" "$binDir\hipblaslt\library\"
          }

          $env:LLAMA_CPP_BUILD_JOBS = [Environment]::ProcessorCount

          python -m build --wheel -C--build-option=egg_info "-C--build-option=--tag-build=$buildtag"

      - name: Upload files to a GitHub release
        id: upload-release
        uses: svenstaro/upload-release-action@2.7.0
        continue-on-error: true
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./dist/*.whl
          tag: ${{ inputs.version }}
          release_name: ${{ inputs.version }}
          file_glob: true
          make_latest: false
          overwrite: true

      - uses: actions/upload-artifact@v6
        if: steps.upload-release.outcome == 'failure'
        with:
          name: rocm-${{ runner.os }}
          path: ./dist/*.whl
