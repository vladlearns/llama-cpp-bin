name: Check Upstream

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for updates
        id: check
        run: |
          git submodule update --remote llama.cpp
          cd llama.cpp
          NEW_TAG=$(git describe --tags --match "b*" --abbrev=0)
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          cd ..
          git diff --quiet llama.cpp && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Skip if no changes
        if: steps.check.outputs.changed == 'false'
        run: echo "No upstream changes, skipping."

      - name: Skip if already released
        if: steps.check.outputs.changed == 'true'
        env:
          NEW_TAG: ${{ steps.check.outputs.new_tag }}
        run: |
          VERSION="${NEW_TAG#b}.0.0"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists, skipping."
            exit 0
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        id: version

      - name: Commit and tag
        if: steps.check.outputs.changed == 'true' && steps.version.outputs.version != ''
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add llama.cpp
          git commit -m "chore: bump llama.cpp to ${{ steps.check.outputs.new_tag }}"
          git tag -a "v${{ steps.version.outputs.version }}" -m "llama.cpp ${{ steps.check.outputs.new_tag }}"
          git push origin main "v${{ steps.version.outputs.version }}"
