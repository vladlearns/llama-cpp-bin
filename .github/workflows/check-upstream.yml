name: Check Upstream

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for updates
        id: check
        run: |
          LATEST=$(git ls-remote --tags --sort=-v:refname https://github.com/ggml-org/llama.cpp.git 'refs/tags/b*' | head -1)
          NEW_TAG=$(echo "$LATEST" | sed 's|.*/||')
          NEW_SHA=$(echo "$LATEST" | awk '{print $1}')
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          CURRENT_SHA=$(git ls-tree HEAD llama.cpp | awk '{print $3}')
          if [ "$NEW_SHA" = "$CURRENT_SHA" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            # Update submodule to the tagged commit
            cd llama.cpp
            git fetch origin "$NEW_SHA" --depth=1
            git checkout "$NEW_SHA"
            cd ..
          fi

      - name: Skip if no changes
        if: steps.check.outputs.changed == 'false'
        run: echo "No upstream changes, skipping."

      - name: Skip if already released
        if: steps.check.outputs.changed == 'true'
        env:
          NEW_TAG: ${{ steps.check.outputs.new_tag }}
        run: |
          VERSION="${NEW_TAG#b}.0.0"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists, skipping."
            exit 0
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        id: version

      - name: Commit and tag
        if: steps.check.outputs.changed == 'true' && steps.version.outputs.version != ''
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add llama.cpp
          git commit -m "chore: bump llama.cpp to ${{ steps.check.outputs.new_tag }}"
          git tag -a "v${{ steps.version.outputs.version }}" -m "llama.cpp ${{ steps.check.outputs.new_tag }}"
          git push origin HEAD:main
          git push origin "refs/tags/v${{ steps.version.outputs.version }}"

      - name: Trigger build
        if: steps.check.outputs.changed == 'true' && steps.version.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: gh workflow run build-everything.yml --ref main -f version="v$VERSION"
